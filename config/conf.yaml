# Paths and overall settings

site:
  name: Luoyang
  latitude: 34.65
  longitude: 112.43

paths:
  data_dir: "/data/external_data"
  config_dir: config
  nwp_config: config/NWP.yaml
  sat_download: himawari
  nwp_download: nwp_download
  nwp_newest: nwp_newest
  # Under data_dir: camera/download base and inference sky folders (see sky_image_subpath)
  skyimg_download: skimg
  skyimg_pred_download: skimg_pred
  # Relative path under skyimg_download and skyimg_pred_download (same subpath for both)
  sky_image_subpath: asi16/asi_16613/20260331
  pv_download: pv
  pv_station_meta: data
  pv_device_path: datasets/XINSHENG_power_total_devices_type1.xlsx


nwp:
  solar_subdir: solar
  wind_subdir: wind

# USB camera for sky images (0 = first camera, 1 = second/"other" camera)
camera:
  camera_id: 2

download:
  user_agent: "Mozilla/5.0 (compatible; NWP downloader)"
