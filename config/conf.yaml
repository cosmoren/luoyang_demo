# Paths and overall settings

site:
  name: Luoyang
  latitude: 34.69984
  longitude: 112.28440

paths:
  data_dir: "/home/hw1/data/luoyang_dataset"
  config_dir: config
  nwp_config: config/NWP.yaml
  pv_download: pv
  pv_station_meta: data
  pv_device_path: dataloader/XINSHENG_power_total_devices_type1.xlsx
  sat_download: himawari
  nwp_download: nwp_download
  nwp_newest: nwp_newest
  # Under data_dir: camera/download base and inference sky folders
  skyimg_download: skyimg
  skyimg_pred: skyimg_pred
  # asi: skyimg_download / sky_image_asi_16613_subpath; pred: skyimg_pred / sky_image_asi_16613_subpath
  sky_image_asi_16613_subpath: asi_16613
  # wylc: skyimg_download / sky_image_wylc_subpath; pred: skyimg_pred / same (optional sky_image_wylc_pred_subpath)
  sky_image_wylc_subpath: wylc

  # Training / eval data (single folder each under data_dir; train and test use the same roots)
  sky_image_path: asi_16613
  pv_path: luoyang_data_626
  sat_path: himawari_cropped
  nwp_path: NWP

nwp:
  solar_subdir: solar
  wind_subdir: wind

# USB camera for sky images (0 = first camera, 1 = second/"other" camera)
camera:
  camera_id: 2

download:
  user_agent: "Mozilla/5.0 (compatible; NWP downloader)"

# Hyperparameters for training/train.py (CLI flags override these when passed)
training:
  # PVDataset: CSV spacing and PV window geometry
  csv_interval_min: 5 # Do not change unless the csv file has a different time resolution
  pv_input_interval_min: 5 # multiple of 5 or csv_interval_min
  pv_input_len: 576
  pv_output_interval_min: 15 # multiple of 5 or csv_interval_min
  pv_output_len: 192
  # Chronological split per CSV: first N rows = train, rest = test; N = int(n_rows * fraction)
  pv_train_time_fraction: 0.7
  test_anchor_stride_min: 6000 # 12000
  # split=val: 10% row band is shorter than test; use a smaller stride (minutes) than test for enough val windows
  val_anchor_stride_min: 1800
  # split=test: match reference last-X collectTime in each CSV within this many minutes (0 = exact)
  test_collect_time_match_tolerance_min: 0
  # Sky / Himawari stacks
  skyimg_window_size: 30 # the newest frame has aligned time with the last PV output row
  skyimg_time_resolution_min: 1
  skyimg_spatial_size: 224 # H=W after resize for model input
  satimg_window_size: 24 # the newest frame has aligned time with the last PV output row
  satimg_time_resolution_min: 10 # multiple of 10
  satimg_npy_shape_hwc: [100, 100, 3] # expected np.load array layout (height, width, channels)
  # Optimization and training loop
  epochs: 50
  lr: 5e-4
  batch_size: 16
  save_every: 5
  num_workers: 24
  # null = run every batch in an epoch
  train_max_batches_per_epoch: null