# Folsom only: irradiance (1 CSV) + sky (.jpg) + NWP (1 merged CSV). No plant Excel.
# -----------------------------------------------------------------------------
# Load this file by passing its path into your trainer (e.g. --config) once wired;
# default repo entrypoints still read config/conf.yaml.
# -----------------------------------------------------------------------------

dataset_profile: folsom

site:
  name: "Folsom, CA"
  latitude: 38.642
  longitude: -121.148

paths:
  data_dir: "/home/kyber/projects/digital energy/folsom_ds/processed"
  folsom_irradiance_csv: irradiance/Folsom_irradiance.csv
  sky_image_path: sky
  folsom_nwp_merged_csv: NWP/nwp_merged_averaged.csv

training:
  csv_interval_min: 1
  irr_input_interval_min: 1
  irr_input_len: 2880
  irr_output_interval_min: 2
  irr_output_len: 1440
  irr_train_time_fraction: 0.7
  test_anchor_stride_min: 120
  test_collect_time_match_tolerance_min: 0
  # Last N sky JPEGs ending at the **last input row** (anchor); oldest first in tensor, newest = anchor time.
  skyimg_window_size: 30
  skyimg_time_resolution_min: 1
  skyimg_spatial_size: 224
  epochs: 50
  lr: 5e-4
  batch_size: 8
  save_every: 5
  num_workers: 8
  train_max_batches_per_epoch: null
